<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1e3d"/>
      <stop offset="100%" stop-color="#0d2a52"/>
    </linearGradient>
    <linearGradient id="gb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d7ff9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Orbit arc -->
  <ellipse cx="64" cy="58" rx="48" ry="40" fill="none" stroke="url(#gb)" stroke-width="2.8" opacity=".75" transform="rotate(-12 64 58)"/>

  <!-- S shape - bold and clean -->
  <path d="
    M50 24 C50 24 82 22 84 42
    C86 58 62 64 58 68
    C54 72 84 78 84 92
    C84 104 68 110 50 108
    L50 100 C64 102 76 98 76 92
    C76 86 54 82 52 78
    C50 74 78 68 80 56
    C82 46 66 28 50 26
    Z" fill="url(#gn)"/>

  <!-- C shape - gray -->
  <path d="
    M74 38 C86 32 96 44 96 62
    C96 80 86 92 74 90
    L74 82 C82 84 90 76 90 62
    C90 50 82 42 74 46
    Z" fill="#7a8da6"/>

  <!-- Small satellite at top right -->
  <g transform="translate(92, 26) rotate(20)">
    <rect x="-6" y="-1.5" width="5" height="3" rx=".5" fill="#0a1e3d"/>
    <rect x="1" y="-1.5" width="5" height="3" rx=".5" fill="#0a1e3d"/>
    <rect x="-1.5" y="-2" width="3" height="4" rx=".8" fill="#0d2a52"/>
    <line x1="0" y1="-2" x2="0" y2="-4.5" stroke="#0d2a52" stroke-width=".8"/>
    <circle cx="0" cy="-5.2" r="1" fill="#38bdf8"/>
  </g>

  <!-- Signal waves -->
  <path d="M96 33 Q98 30 96 27" fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
  <path d="M99 35 Q102 31 99 27" fill="none" stroke="#38bdf8" stroke-width=".9" stroke-linecap="round" opacity=".4"/>
